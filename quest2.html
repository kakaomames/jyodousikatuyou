<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
<title>WE Quest SV</title></head><body>
<div id="field">
    <div class="status" id="est" style="align-self: flex-start;">
        <div id="en">Loading...</div>
        <div class="hp-bar"><div id="eh" class="hp-fill"></div></div>
    </div>
    <div id="mon" style="font-size: 80px; text-align: center;">👾</div>
    <div class="status" id="pst" style="align-self: flex-end;">
        <div id="pn">YOU</div>
        <div class="hp-bar"><div id="ph" class="hp-fill"></div></div>
    </div>
</div>
<div id="ui">
    <div id="msg"></div>
    <div id="cmd" class="cmd-grid"></div>
</div>
<script>
let D=[],G={},P={},E={};const $=i=>document.getElementById(i),L=t=>$('msg').innerText=t;
async function init(){
    const [r1,r2]=await Promise.all([fetch('./tanngo.json'),fetch('./config.json')]);
    D=await r1.json();G=await r2.json();
    L("最初のパートナーを選んで！");
    $('cmd').innerHTML="";
    G.starters.forEach(s=>{
        const b=document.createElement('button');b.innerText=s.n;b.className="atk-btn";
        b.onclick=()=>{P=s;P.h=G.player.hp;spawn();};
        $('cmd').appendChild(b);
    });
}
function spawn(){
    E=D[Math.floor(Math.random()*D.length)];E.h=100;$('mon').innerText="👾";upd();
    L(`野生の ${E.n} が飛び出してきた！`);menu();
}
function upd(){
    $('eh').style.width=E.h+"%";$('ph').style.width=(P.h/G.player.hp)*100+"%";
    $('en').innerText=E.n;$('pn').innerText=P.n;
}
function menu(){
    const c=$('cmd');c.innerHTML="";
    const b1=document.createElement('button');b1.innerText="たたかう";b1.className="atk-btn";b1.onclick=atk;
    const b2=document.createElement('button');b2.innerText="バッグ";b2.className="ball-btn";b2.onclick=get;
    const b3=document.createElement('button');b3.innerText="にげる";b3.className="run-btn";b3.onclick=spawn;
    [b1,b2,b3].forEach(b=>c.appendChild(b));
}
function atk(){
    $('cmd').innerHTML="";L(`${E.n}を解析中...意味を選べ！`);
    const ok=E.m,cs=shf([ok,"打消","過去","使役"]).slice(0,4);
    cs.forEach(v=>{
        const b=document.createElement('button');b.innerText=v;b.className="atk-btn";
        b.onclick=()=>{
            if(v===ok){E.h-=G.balance.dmg;L("効果は ばつぐんだ！");}
            else{P.h-=G.balance.heal;L("解析に失敗した！");}
            upd();setTimeout(E.h<=0||P.h<=0?spawn:menu,1000);
        };
        $('cmd').appendChild(b);
    });
}
function get(){
    L("モンスターボールを投げた！");$('mon').innerText="🔴";
    setTimeout(()=>{
        if(Math.random()*100 < (100-E.h)+10){L(`${E.n}を捕まえた！`);$('mon').innerText="✨";setTimeout(spawn,1500);}
        else{L("だめだ！ボールから出てしまった！");menu();}
    },1000);
}
function shf(a){return a.sort(()=>Math.random()-.5);}
init();</script></body></html>
