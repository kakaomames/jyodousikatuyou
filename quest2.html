<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
<title>WE Quest Canvas</title>
<style>
    /* キャンバスを重ねるための設定 */
    #game-container { position: relative; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; }
    /* UI層だけは最前面でクリックを通す */
    #ui-layer { z-index: 30; }
    #mon-layer { z-index: 20; }
    #map-layer { z-index: 10; }
</style>
</head><body>

<div id="game-container">
    <canvas id="map-layer"></canvas>  <canvas id="mon-layer"></canvas>  <canvas id="ui-layer"></canvas>   </div>

<div id="title-screen">...（略）...</div>

<script src="game.js"></script>
</body></html>
