<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WE Quest</title><style>
:root{--c:#0f4;--b:#000}body{background:--b;color:--c;font-family:monospace;margin:0;overflow:hidden}
#s{height:100vh;display:flex;flex-direction:column}#b{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#010}
.w{width:80%;border:1px solid #fff;padding:5px;margin:5px}.h{height:8px;background:#333;margin-top:4px}
.f{height:100%;background:--c;transition:width .3s}#m{height:180px;font-size:60px}
#u{height:220px;background:#111;border-top:2px solid #444;padding:10px}
#l{height:30px;font-size:.8rem;border-bottom:1px solid #333}
.g{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px}
button{background:#222;color:#fff;border:1px solid #666;padding:10px;font-size:.7rem;cursor:pointer}
</style></head><body><div id="s"><div id="b">
<div class="w" id="ew">n/a<div class="h"><div id="eh" class="f"></div></div></div>
<div id="m">👾</div><div class="w" id="pw">YOU<div class="h"><div id="ph" class="f"></div></div></div>
</div><div id="u"><div id="l"></div><div id="c" class="g"></div></div></div>
<script>
let D=[],G={},P={h:100},E={},K;const $=i=>document.getElementById(i),L=t=>$('l').innerText=t;
async function init(){
const r1=await fetch('./tanngo.json'),r2=await fetch('./config.json');
D=await r1.json();G=await r2.json();pick();}
function pick(){
L("初期の三匹を選択せよ");$('c').innerHTML="";
G.starters.forEach(s=>{$('c').appendChild(btn(s.n,()=>{P=s;P.h=G.player.hp;start();}))});}
function btn(t,f){const b=document.createElement('button');b.innerText=t;b.onclick=f;return b;}
function start(){spawn();menu();}
function spawn(){E=D[Math.floor(Math.random()*D.length)];E.h=100;$('m').innerText="👾";upd();L(`野生の ${E.n} が現れた！`);}
function upd(){$('eh').style.width=E.h+"%";$('ph').style.width=(P.h/G.player.hp)*100+"%";$('ew').innerText=`${E.n} HP:${E.h}%`;$('pw').innerText=`${P.n} HP:${P.h}`;}
function menu(){$('c').innerHTML="";
$('c').appendChild(btn("解析(ATK)",atk));$('c').appendChild(btn("ボール",get));$('c').appendChild(btn("逃げる",spawn));}
function atk(){$('c').innerHTML="";L(`${E.n}の[終止形]は？`);
const ok=E.c[2],cs=shf([ok,"れ","ら","る"]).slice(0,4);
cs.forEach(v=>{$('c').appendChild(btn(v,()=>{
if(v===ok){E.h-=G.balance.dmg;L("解析成功！大ダメージ！");}else{P.h-=G.balance.heal;L("解析ミス！反撃！");}
upd();setTimeout(E.h<=0||P.h<=0?spawn:menu,800);}))});}
function get(){L("ボールを投げた！");$('m').innerText="🔴";
setTimeout(()=>{const p=(100-E.h)+10;if(Math.random()*100<p){L("ゲット成功！");$('m').innerText="🎉";setTimeout(spawn,1000);}else{L("逃げられた！");menu();}},800);}
function shf(a){return a.sort(()=>Math.random()-.5);}
init();</script></body></html>
